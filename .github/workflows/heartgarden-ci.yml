# CI for the heartgarden Next.js app
name: heartgarden CI

on:
  push:
    paths:
      - "heartgarden/**"
      - ".github/workflows/heartgarden-ci.yml"
  pull_request:
    paths:
      - "heartgarden/**"
      - ".github/workflows/heartgarden-ci.yml"

jobs:
  check-and-e2e:
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Extract Node version from mise.toml
        id: versions
        run: |
          NODE_VERSION=$(grep '^node' mise.toml | cut -d'"' -f2)
          echo "node=$NODE_VERSION" >> $GITHUB_OUTPUT

      - uses: pnpm/action-setup@v5
        with:
          package_json_file: heartgarden/package.json
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ steps.versions.outputs.node }}
          cache: pnpm
          cache-dependency-path: heartgarden/pnpm-lock.yaml

      - name: CI diagnostics
        working-directory: heartgarden
        run: |
          echo "::group::Environment"
          echo "Node: $(node -v)"
          echo "pnpm: $(pnpm -v)"
          echo "Runner OS: $RUNNER_OS"
          echo "Ref: $GITHUB_REF"
          echo "::endgroup::"

      - name: Install dependencies
        env:
          # TODO kill adding .git/hooks to dev envs
          # Avoid mutating .git/hooks in CI; prepare script respects this (see heartgarden/scripts/install-git-hooks.mjs).
          SKIP_INSTALL_GIT_HOOKS: "1"
        working-directory: heartgarden
        run: |
          echo "::group::Install dependencies"
          pnpm install --frozen-lockfile
          echo "::endgroup::"

      - name: Verify foundation sync
        working-directory: heartgarden
        run: |
          echo "::group::Verify foundation sync"
          pnpm run verify:foundation-sync
          echo "::endgroup::"

      - name: Lint and build
        working-directory: heartgarden
        run: |
          echo "::group::Lint and build"
          pnpm run check
          echo "::endgroup::"

      - name: Build Storybook
        working-directory: heartgarden
        run: |
          echo "::group::Build Storybook (regression guard for .storybook + stories)"
          pnpm run build-storybook
          echo "::endgroup::"

      - name: Install Playwright Chromium
        working-directory: heartgarden
        run: |
          echo "::group::Install Playwright Chromium"
          pnpm exec playwright install --with-deps chromium
          echo "::endgroup::"

      # Playwright skips e2e/visual on CI (platform-specific screenshots); smoke + interaction tests only.
      - name: E2E tests
        working-directory: heartgarden
        run: |
          echo "::group::E2E tests"
          pnpm run test:e2e
          echo "::endgroup::"
        env:
          CI: "1"
