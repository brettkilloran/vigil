# CI for the heartgarden Next.js app (app root directory `heartgarden/` — see heartgarden/docs/NAMING.md).
name: heartgarden CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    paths:
      - "heartgarden/**"
      - ".github/workflows/heartgarden-ci.yml"
  pull_request:
    paths:
      - "heartgarden/**"
      - ".github/workflows/heartgarden-ci.yml"

defaults:
  run:
    working-directory: heartgarden

jobs:
  check-and-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: heartgarden/package-lock.json
      - name: CI diagnostics
        run: |
          echo "::group::Environment"
          echo "Node: $(node -v)"
          echo "npm: $(npm -v)"
          echo "Runner OS: $RUNNER_OS"
          echo "Ref: $GITHUB_REF"
          echo "::endgroup::"
      - name: Install dependencies
        env:
          # Avoid mutating .git/hooks in CI; prepare script respects this (see heartgarden/scripts/install-git-hooks.mjs).
          SKIP_INSTALL_GIT_HOOKS: "1"
        run: |
          echo "::group::Install dependencies"
          npm ci
          echo "::endgroup::"
      - name: Verify foundation sync
        run: |
          echo "::group::Verify foundation sync"
          npm run verify:foundation-sync
          echo "::endgroup::"
      - name: Lint and build
        run: |
          echo "::group::Lint and build"
          npm run check
          echo "::endgroup::"
      - name: Build Storybook
        run: |
          echo "::group::Build Storybook (regression guard for .storybook + stories)"
          npm run build-storybook
          echo "::endgroup::"
      - name: Install Playwright Chromium
        run: |
          echo "::group::Install Playwright Chromium"
          npx playwright install --with-deps chromium
          echo "::endgroup::"
      # Playwright skips e2e/visual on CI (platform-specific screenshots); smoke + interaction tests only.
      - name: E2E tests
        run: |
          echo "::group::E2E tests"
          npm run test:e2e
          echo "::endgroup::"
        env:
          CI: "1"
